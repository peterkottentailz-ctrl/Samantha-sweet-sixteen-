<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen – Old Hollywood Upload</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: "Cinzel", serif;
            color: gold;
            text-align: center;
        }

        /* Simple red curtain background at top */
        #curtain {
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 25px 15px;
            border-bottom: 4px solid gold;
            box-shadow: 0 0 25px gold;
        }

        #curtain h1 {
            margin: 0;
            font-family: "Playfair Display", serif;
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px gold;
        }

        #curtain p {
            margin-top: 8px;
            font-size: 16px;
            color: #f5e1a0;
        }

        /* Simple filmstrip-style frame using borders and dots */
        #frame {
            margin: 25px auto;
            max-width: 420px;
            padding: 18px;
            border: 4px solid gold;
            box-shadow: 0 0 20px gold;
            background: #111;
            position: relative;
        }

        #frame::before,
        #frame::after {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            height: 6px;
            background-image: radial-gradient(circle, #000 2px, transparent 2px);
            background-size: 16px 6px;
        }

        #frame::before {
            top: -12px;
        }

        #frame::after {
            bottom: -12px;
        }

        /* Simple “star” badge */
        #starBadge {
            margin: 0 auto 15px auto;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid gold;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            box-shadow: 0 0 15px gold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 16px;
            color: #f5e1a0;
        }

        .ticketButton {
            display: inline-block;
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: black;
            font-weight: bold;
            padding: 12px 18px;
            border-radius: 10px;
            border: 3px dashed black;
            margin-top: 15px;
            width: 90%;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: 0 0 12px gold;
        }

        #status {
            margin-top: 18px;
            font-size: 16px;
            font-weight: bold;
            color: gold;
        }

        #footer {
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 18px;
            color: gold;
            font-size: 16px;
            border-top: 4px solid gold;
            margin-top: 30px;
            box-shadow: 0 -8px 20px gold;
        }
    </style>
</head>

<body>

    <div id="curtain">
        <h1>Samantha's Sweet Sixteen</h1>
        <p>Old Hollywood Photo Upload</p>
    </div>

    <div id="frame">
        <div id="starBadge">
            OLD HOLLYWOOD STAR
        </div>

        <p>Take a photo using your camera:</p>
        <label class="ticketButton">
            Tap to Take Photo
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        </label>

        <p style="margin-top:20px;">Or upload multiple photos from your gallery:</p>
        <label class="ticketButton">
            Upload Gallery Photos
            <input type="file" id="galleryInput" accept="image/*" multiple style="display:none;">
        </label>

        <div id="status"></div>
    </div>

    <div id="footer">
        Walk the red carpet and upload your best shots ✨
    </div>

    <script>
        const uploadUrl = "https://script.google.com/macros/s/AKfycbzjLkwPl7QZMEwJx0VK4k8H4jSIJ5Kopo9boIUWtFoUmDkhVHw3nkS-u4LB4Q7oNiHJ4A/exec";

        async function uploadSinglePhoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();

                reader.onload = async function() {
                    const base64 = reader.result.split(",")[1];

                    const formData = new FormData();
                    formData.append("file", base64);

                    const response = await fetch(uploadUrl, {
                        method: "POST",
                        body: formData
                    });

                    resolve(response.ok);
                };

                reader.readAsDataURL(file);
            });
        }

        document.getElementById('cameraInput').addEventListener('change', async () => {
            const file = cameraInput.files[0];
            document.getElementById('status').innerText = "Uploading...";
            const success = await uploadSinglePhoto(file);
            document.getElementById('status').innerText = success ? "Photo uploaded successfully!" : "Upload failed.";
        });

        document.getElementById('galleryInput').addEventListener('change', async () => {
            const files = galleryInput.files;
            document.getElementById('status').innerText = "Uploading multiple photos...";

            let uploaded = 0;

            for (let i = 0; i < files.length; i++) {
                const success = await uploadSinglePhoto(files[i]);
                if (success) uploaded++;
            }

            document.getElementById('status').innerText =
                `Uploaded ${uploaded} of ${files.length} photos successfully!`;
        });
    </script>

</body>
</html>
