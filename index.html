<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen Upload</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            text-align: center;
            padding: 40px;
        }

        #container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.15);
        }

        #fileInput {
            margin-top: 20px;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="container">
        <h2>Samantha's Sweet Sixteen</h2>
        <p>Upload your photo below:</p>

        <input type="file" id="fileInput" accept="image/*" capture="environment">

        <div id="status"></div>
    </div>

    <script>
        const uploadUrl = "https://script.google.com/macros/s/AKfycbzjLkwPl7QZMEwJx0VK4k8H4jSIJ5Kopo9boIUWtFoUmDkhVHw3nkS-u4LB4Q7oNiHJ4A/exec";

        async function uploadPhoto(file) {
            try {
                const reader = new FileReader();

                reader.onload = async function() {
                    const base64 = reader.result.split(",")[1];

                    const formData = new FormData();
                    formData.append("file", base64);

                    const response = await fetch(uploadUrl, {
                        method: "POST",
                        body: formData
                    });

                    if (response.ok) {
                        document.getElementById('status').innerText = "Photo uploaded successfully!";
                    } else {
                        document.getElementById('status').innerText = "Upload failed.";
                    }
                };

                reader.readAsDataURL(file);

            } catch (error) {
                document.getElementById('status').innerText = "Error uploading photo.";
            }
        }

        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            uploadPhoto(file);
        });
    </script>

</body>
</html>
