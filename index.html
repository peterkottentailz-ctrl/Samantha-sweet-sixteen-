<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen – Old Hollywood Upload</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #ffffff10, #000000 70%);
            font-family: "Cinzel", serif;
            color: gold;
            text-align: center;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        #header {
            background: black;
            padding: 40px 20px;
            border-bottom: 6px solid gold;
            border-top: 6px solid gold;
            box-shadow: 0 0 40px gold;
        }

        #header h1 {
            font-family: "Playfair Display", serif;
            font-size: 36px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            color: gold;
            text-shadow: 0 0 10px gold;
        }

        #container {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            max-width: 480px;
            margin: 40px auto;
            border: 3px solid gold;
            box-shadow: 0 0 25px gold;
        }

        p {
            font-size: 18px;
            color: #e6c87c;
        }

        input[type="file"] {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #222;
            color: gold;
            border: 2px solid gold;
            width: 90%;
        }

        #status {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 10px gold;
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>Samantha's Sweet Sixteen</h1>
        <p style="color:#e6c87c; font-size:20px;">Old Hollywood Photo Upload</p>
    </div>

    <div id="container">
        <p>Take a photo using your camera:</p>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <p style="margin-top:25px;">Or upload multiple photos from your gallery:</p>
        <input type="file" id="galleryInput" accept="image/*" multiple>

        <div id="status"></div>
    </div>

    <script>
        const uploadUrl = "https://script.google.com/macros/s/AKfycbzjLkwPl7QZMEwJx0VK4k8H4jSIJ5Kopo9boIUWtFoUmDkhVHw3nkS-u4LB4Q7oNiHJ4A/exec";

        async function uploadSinglePhoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();

                reader.onload = async function() {
                    const base64 = reader.result.split(",")[1];

                    const formData = new FormData();
                    formData.append("file", base64);

                    const response = await fetch(uploadUrl, {
                        method: "POST",
                        body: formData
                    });

                    resolve(response.ok);
                };

                reader.readAsDataURL(file);
            });
        }

        document.getElementById('cameraInput').addEventListener('change', async () => {
            const file = cameraInput.files[0];
            document.getElementById('status').innerText = "Uploading...";
            const success = await uploadSinglePhoto(file);
            document.getElementById('status').innerText = success ? "Photo uploaded successfully!" : "Upload failed.";
        });

        document.getElementById('galleryInput').addEventListener('change', async () => {
            const files = galleryInput.files;
            document.getElementById('status').innerText = "Uploading multiple photos...";

            let uploaded = 0;

            for (let i = 0; i < files.length; i++) {
                const success = await uploadSinglePhoto(files[i]);
                if (success) uploaded++;
            }

            document.getElementById('status').innerText =
                `Uploaded ${uploaded} of ${files.length} photos successfully!`;
        });
    </script>

</body>
</html>
