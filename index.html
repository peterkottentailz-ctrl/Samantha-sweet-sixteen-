<!DOCTYPE html>
<html>
<head>
<title>Samantha Raucho’s Sweet Sixteen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f7f0ff;
  padding: 20px;
}
h1 {
  color: #7a2cbf;
}
button {
  background: #7a2cbf;
  color: white;
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}
button:hover {
  background: #5e1f92;
}
#preview {
  margin-top: 20px;
  max-width: 90%;
}
#status {
  margin-top: 15px;
  font-size: 18px;
  color: #333;
}
</style>
</head>

<body>

<h1>Samantha Raucho’s Sweet Sixteen</h1>
<p>Take a photo and it will upload automatically!</p>

<input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none;">
<button onclick="document.getElementById('cameraInput').click();">Take Photo</button>

<img id="preview" />
<div id="status"></div>

<script>
document.getElementById('cameraInput').addEventListener('change', async function(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Show preview
    const img = document.getElementById('preview');
    img.src = URL.createObjectURL(file);

    document.getElementById('status').innerText = "Uploading photo...";

    // Convert file to form data
try {
    const uploadUrl = "https://script.google.com/macros/s/AKfycbwAaQ3pIglcOE5bsaI6f8J4fHKazj-WXwFw5nJd5vAzEXs4mK_URqBW5CB06m0IWUQT/exec";

    const response = await fetch(uploadUrl, {
        method: "POST",
        headers: {
            "Content-Type": "application/octet-stream"
        },
        body: file
    });

    if (response.ok) {
        document.getElementById('status').innerText = "Photo uploaded successfully!";
    } else {
        document.getElementById('status').innerText = "Upload failed.";
    }
} catch (error) {
    document.getElementById('status').innerText = "Error uploading photo.";

</script>

</body>
</html>
