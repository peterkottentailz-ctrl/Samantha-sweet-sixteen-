<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen – Upload</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: "Cinzel", serif;
            color: gold;
            text-align: center;
        }

        /* Red header */
        #header {
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 25px 15px;
            border-bottom: 4px solid gold;
            box-shadow: 0 0 25px gold;
        }

        #header h1 {
            margin: 0;
            font-family: "Playfair Display", serif;
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px gold;
        }

        #header p {
            margin-top: 8px;
            font-size: 16px;
            color: #f5e1a0;
        }

        /* Gold photo frame */
        #photoFrame {
            margin: 25px auto;
            width: 260px;
            padding: 10px;
            border: 4px solid gold;
            border-radius: 12px;
            box-shadow: 0 0 20px gold;
            background: #000;
        }

        #samanthaPhoto {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        /* Upload container */
        #uploadBox {
            margin: 25px auto;
            max-width: 420px;
            padding: 18px;
            border: 4px solid gold;
            box-shadow: 0 0 20px gold;
            background: #111;
        }

        p {
            font-size: 16px;
            color: #f5e1a0;
        }

        /* Movie ticket buttons */
        .ticketButton {
            display: inline-block;
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: black;
            font-weight: bold;
            padding: 12px 18px;
            border-radius: 10px;
            border: 3px dashed black;
            margin-top: 15px;
            width: 90%;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: 0 0 12px gold;
        }

        #status {
            margin-top: 18px;
            font-size: 16px;
            font-weight: bold;
            color: gold;
        }

        /* Footer */
        #footer {
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 18px;
            color: gold;
            font-size: 16px;
            border-top: 4px solid gold;
            margin-top: 30px;
            box-shadow: 0 -8px 20px gold;
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>Samantha's Sweet Sixteen</h1>
        <p>Photo Upload</p>
    </div>

    <!-- Samantha's Photo -->
    <div id="photoFrame">
        <img src="https://github.com/peterkottentailz-ctrl/Samantha-sweet-sixteen-/raw/refs/heads/main/sams%20pic" 
             alt="Samantha" id="samanthaPhoto">
    </div>

    <!-- Upload Box -->
    <div id="uploadBox">
        <p>Take a photo using your camera:</p>
        <label class="ticketButton">
            Tap to Take Photo
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        </label>

        <p style="margin-top:20px;">Or upload multiple photos from your gallery:</p>
        <label class="ticketButton">
            Upload Gallery Photos
            <input type="file" id="galleryInput" accept="image/*" multiple style="display:none;">
        </label>

        <div id="status"></div>
    </div>

    <div id="footer">
        Walk the red carpet and upload your best shots ✨
    </div>

    <script>
        const uploadUrl = "https://script.google.com/macros/s/AKfycbzjLkwPl7QZMEwJx0VK4k8H4jSIJ5Kopo9boIUWtFoUmDkhVHw3nkS-u4LB4Q7oNiHJ4A/exec";

        async function uploadSinglePhoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();

                reader.onload = async function() {
                    const base64 = reader.result.split(",")[1];

                    const formData = new FormData();
                    formData.append("file", base64);

                    const response = await fetch(uploadUrl, {
                        method: "POST",
                        body: formData
                    });

                    resolve(response.ok);
                };

                reader.readAsDataURL(file);
            });
        }

        document.getElementById('cameraInput').addEventListener('change', async () => {
            const file = cameraInput.files[0];
            document.getElementById('status').innerText = "Uploading...";
            const success = await uploadSinglePhoto(file);
            document.getElementById('status').innerText = success ? "Photo uploaded successfully!" : "Upload failed.";
        });

        document.getElementById('galleryInput').addEventListener('change', async () => {
            const files = galleryInput.files;
            document.getElementById('status').innerText = "Uploading multiple photos...";

            let uploaded = 0;

            for (let i = 0; i < files.length; i++) {
                const success = await uploadSinglePhoto(files[i]);
                if (success) uploaded++;
            }

            document.getElementById('status').innerText =
                `Uploaded ${uploaded
