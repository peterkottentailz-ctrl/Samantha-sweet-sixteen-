<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen – Old Hollywood Upload</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: "Cinzel", serif;
            color: gold;
            text-align: center;
            overflow-x: hidden;
        }

        /* Spotlight animation */
        .spotlight {
            position: fixed;
            top: -200px;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,200,0.25) 0%, rgba(255,255,200,0) 70%);
            transform: translateX(-50%) rotate(20deg);
            animation: moveSpotlight 6s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes moveSpotlight {
            0% { transform: translateX(-50%) rotate(10deg); }
            100% { transform: translateX(-50%) rotate(-10deg); }
        }

        /* Sparkle animation */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            animation: sparkleMove 3s infinite ease-in-out;
            opacity: 0.8;
            z-index: 0;
        }

        @keyframes sparkleMove {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(0.2); opacity: 0; }
        }

        /* Gold glitter overlay */
        #glitterOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('https://i.imgur.com/7yZ8FvP.png');
            background-size: cover;
            opacity: 0.25;
            pointer-events: none;
            z-index: 1;
        }

        /* Curtain animation */
        #curtainLeft, #curtainRight {
            position: fixed;
            top: 0;
            width: 50vw;
            height: 100vh;
            background: url('https://i.imgur.com/2u7qf2F.jpeg');
            background-size: cover;
            animation: curtainOpen 3s forwards ease-in-out;
            z-index: 3;
        }

        #curtainLeft { left: 0; }
        #curtainRight { right: 0; }

        @keyframes curtainOpen {
            0% { width: 50vw; }
            100% { width: 0; }
        }

        /* Filmstrip border */
        #filmstrip {
            border: 12px solid gold;
            border-image: url('https://i.imgur.com/8fKQZQx.png') 30 round;
            padding: 0;
            margin: 0;
            position: relative;
            z-index: 2;
        }

        /* Marquee title */
        #marquee {
            background: black;
            padding: 20px;
            border-bottom: 6px solid gold;
            border-top: 6px solid gold;
            box-shadow: 0 0 40px gold;
            font-size: 32px;
            font-family: "Playfair Display", serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: gold;
            text-shadow: 0 0 10px gold;
        }

        /* Walk of Fame star */
        #star {
            width: 200px;
            margin: 20px auto;
        }

        /* Container */
        #container {
            background: #111;
            padding: 30px;
            border-radius: 12px;
            max-width: 480px;
            margin: 40px auto;
            border: 3px solid gold;
            box-shadow: 0 0 25px gold;
            position: relative;
            z-index: 2;
        }

        p {
            font-size: 18px;
            color: #e6c87c;
        }

        /* Movie ticket button */
        .ticketButton {
            display: inline-block;
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: black;
            font-weight: bold;
            padding: 14px 20px;
            border-radius: 10px;
            border: 3px dashed black;
            margin-top: 20px;
            width: 90%;
            cursor: pointer;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 0 15px gold;
        }

        #status {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 10px gold;
        }

        /* Red carpet footer */
        #footer {
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 25px;
            color: gold;
            font-size: 18px;
            border-top: 6px solid gold;
            margin-top: 60px;
            box-shadow: 0 -10px 30px gold;
        }
    </style>
</head>

<body>

    <div class="spotlight"></div>
    <div id="glitterOverlay"></div>

    <!-- Sparkles -->
    <script>
        for (let i = 0; i < 40; i++) {
            const s = document.createElement("div");
            s.className = "sparkle";
            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 100 + "vh";
            s.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(s);
        }
    </script>

    <!-- Curtains -->
    <div id="curtainLeft"></div>
    <div id="curtainRight"></div>

    <div id="filmstrip">
        <div id="marquee">Samantha's Sweet Sixteen</div>

        <img id="star" src="https://i.imgur.com/1tQ0p8G.png">

        <div id="container">
            <p>Take a photo using your camera:</p>
            <label class="ticketButton">
                Tap to Take Photo
                <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
            </label>

            <p style="margin-top:25px;">Or upload multiple photos from your gallery:</p>
            <label class="ticketButton">
                Upload Gallery Photos
                <input type="file" id="galleryInput" accept="image/*" multiple style="display:none;">
            </label>

            <div id="status"></div>
        </div>

        <div id="footer">
            Walk the red carpet and upload your best shots ✨
        </div>
    </div>

    <script>
        const uploadUrl = "https://script.google.com/macros/s/AKfycbzjLkwPl7QZMEwJx0VK4k8H4jSIJ5Kopo9boIUWtFoUmDkhVHw3nkS-u4LB4Q7oNiHJ4A/exec";

        async function uploadSinglePhoto(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();

                reader.onload = async function() {
                    const base64 = reader.result.split(",")[1];

                    const formData = new FormData();
                    formData.append("file", base64);

                    const response = await fetch(uploadUrl, {
                        method: "POST",
                        body: formData
                    });

                    resolve(response.ok);
                };

                reader.readAsDataURL(file);
            });
        }

        document.getElementById('cameraInput').addEventListener('change', async () => {
            const file = cameraInput.files[0];
            document.getElementById('status').innerText = "Uploading...";
            const success = await uploadSinglePhoto(file);
            document.getElementById('status').innerText = success ? "Photo uploaded successfully!" : "Upload failed.";
        });

        document.getElementById('galleryInput').addEventListener('change', async () => {
            const files = galleryInput.files;
            document.getElementById('status').innerText = "Uploading multiple photos...";

            let uploaded = 0;

            for (let i = 0; i < files.length; i++) {
                const success = await uploadSinglePhoto(files[i]);
                if (success) uploaded++;
            }

            document.getElementById('status').innerText =
                `Uploaded ${uploaded} of ${files.length} photos successfully!`;
        });
    </script>

</body>
</html>
