<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen – Upload</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: "Cinzel", serif;
            color: gold;
            overflow: hidden; /* Prevent scroll before entering */
        }

        /* Curtains closed */
        .curtain {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 50%;
            height: 100%;
            object-fit: cover;
            z-index: 5;
            pointer-events: none;
            transition: transform 2s ease-in-out;
        }

        #curtainLeft { left: 0; transform: translateX(0); }
        #curtainRight { right: 0; transform: translateX(0); }

        .openLeft { transform: translateX(-100%); }
        .openRight { transform: translateX(100%); }

        /* ENTER SCREEN */
        #enterScreen {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Movie Theater Marquee Button */
        #enterButton {
            background: linear-gradient(to bottom, #990000, #660000);
            padding: 20px 40px;
            border-radius: 20px;
            border: 6px solid gold;
            box-shadow: 0 0 25px gold, 0 0 10px red inset;
            color: gold;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            text-align: center;
            position: relative;
        }

        /* Bulbs */
        #enterButton::before,
        #enterButton::after {
            content: "";
            position: absolute;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 20%, #ffd700 60%, #b8860b 80%);
            box-shadow: 0 0 12px gold;
        }

        #enterButton::before { left: -30px; top: 50%; transform: translateY(-50%); }
        #enterButton::after { right: -30px; top: 50%; transform: translateY(-50%); }

        /* Fade-in content after entering */
        #pageWrapper {
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        #pageWrapper.showContent {
            opacity: 1;
        }

        /* Filmstrip border */
        #pageWrapper {
            min-height: 100vh;
            border: 12px solid black;
            box-shadow: 0 0 30px gold;
            background:
                radial-gradient(circle at top left, rgba(255,215,0,0.25), transparent 55%),
                radial-gradient(circle at bottom right, rgba(255,215,0,0.25), transparent 55%),
                #000;
            position: relative;
            overflow: hidden;
        }

        #pageWrapper::before,
        #pageWrapper::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            height: 18px;
            background-image: radial-gradient(circle, #000 40%, transparent 41%);
            background-size: 40px 18px;
            background-repeat: repeat-x;
        }

        #pageWrapper::before { top: -2px; }
        #pageWrapper::after { bottom: -2px; }
