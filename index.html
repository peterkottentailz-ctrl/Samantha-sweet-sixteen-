<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen Upload</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            text-align: center;
            padding: 40px;
        }

        #container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.15);
        }

        #fileInput {
            margin-top: 20px;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="container">
        <h2>Samantha's Sweet Sixteen</h2>
        <p>Upload your photo below:</p>

        <input type="file" id="fileInput" accept="image/*" capture="environment">

        <div id="status"></div>
    </div>

    <script>
        async function uploadPhoto(file) {
            try {
                const uploadUrl = "https://script.google.com/macros/s/AKfycbwAaQ3pIglcOE5bsaI6f8J4fHKazj-WXwFw5nJd5vAzEXs4mK_URqBW5CB06m0IWUQT/exec";

                const response = await fetch(uploadUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/octet-stream"
                    },
                    body: file
                });

                if (response.ok) {
                    document.getElementById('status').innerText = "Photo uploaded successfully!";
                } else {
                    document.getElementById('status').innerText = "Upload failed.";
                }
            } catch (error) {
                document.getElementById('status').innerText = "Error uploading photo.";
            }
        }

        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            uploadPhoto(file);
        });
    </script>

</body>
</html>
