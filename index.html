        body {

            color: gold;

            overflow-x: hidden;

        /* Spotlight animation */
        .spotlight {
            position: fixed;
            top: -200px;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,200,0.25) 0%, rgba(255,255,200,0) 70%);
            transform: translateX(-50%) rotate(20deg);
            animation: moveSpotlight 6s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes moveSpotlight {
            0% { transform: translateX(-50%) rotate(10deg); }
            100% { transform: translateX(-50%) rotate(-10deg); }
        }

        /* Sparkle animation */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: gold;
            border-radius: 50%;
            animation: sparkleMove 3s infinite ease-in-out;
            opacity: 0.8;
            z-index: 0;
        }

        @keyframes sparkleMove {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(0.2); opacity: 0; }
        }

        /* Gold glitter overlay (soft noise effect) */
        #glitterOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image:
                radial-gradient(circle, rgba(255,215,0,0.15) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,215,0,0.1) 1px, transparent 1px);
            background-size: 3px 3px, 5px 5px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 1;
        }

        #curtainLeft, #curtainRight {

            top: 0;

            height: 100vh;
            background: linear-gradient(

                #660000,
                #990000,
                #cc0000,
                #990000,
                #660000
            );
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            animation: curtainOpen 3s forwards ease-in-out;
            z-index: 3;
        }

        #curtainLeft { left: 0; }
        #curtainRight { right: 0; }

        @keyframes curtainOpen {
            0% { width: 50vw; }
            100% { width: 0; }

                    transparent 85%,
                    #000 85%,
                    #000 90%,
                    transparent 90%
                );
        }

        #filmstrip::before,
        #filmstrip::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            height: 16px;
            background:
                repeating-linear-gradient(
                    to right,
                    #000 0,
                    #000 20px,
                    #444 20px,
                    #444 30px

        }

        #filmstrip::before {
            top: -16px;
        }

        #filmstrip::after {
            bottom: -16px;
        }
