<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samantha's Sweet Sixteen – Upload</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&family=Great+Vibes&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: black;
            font-family: "Cinzel", serif;
            color: gold;
        }

        /* Filmstrip border */
        #pageWrapper {
            min-height: 100vh;
            border: 12px solid black;
            box-shadow: 0 0 30px gold;
            background:
                radial-gradient(circle at top left, rgba(255,215,0,0.25), transparent 55%),
                radial-gradient(circle at bottom right, rgba(255,215,0,0.25), transparent 55%),
                #000;
            position: relative;
            overflow: hidden;
        }

        #pageWrapper::before,
        #pageWrapper::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            height: 18px;
            background-image: radial-gradient(circle, #000 40%, transparent 41%);
            background-size: 40px 18px;
            background-repeat: repeat-x;
        }

        #pageWrapper::before { top: -2px; }
        #pageWrapper::after { bottom: -2px; }

        /* Glitter overlay */
        #glitterOverlay {
            pointer-events: none;
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 2px),
                radial-gradient(circle, rgba(255,215,0,0.25) 1px, transparent 3px);
            background-size: 120px 120px, 200px 200px;
            mix-blend-mode: screen;
            opacity: 0.35;
            z-index: 2;
        }

        /* Curtains */
        #curtainLeft,
        #curtainRight {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 30%;
            background-size: cover;
            background-position: center;
            z-index: 3;
            pointer-events: none;
            transition: transform 2.2s ease-in-out;
        }

        #curtainLeft {
            left: 0;
            background-image: url('curtain-left.png');
            transform: translateX(0);
        }

        #curtainRight {
            right: 0;
            background-image: url('curtain-right.png');
            transform: translateX(0);
        }

        .openLeft { transform: translateX(-100%); }
        .openRight { transform: translateX(100%); }

        /* Content */
        #content {
            position: relative;
            z-index: 4;
            text-align: center;
            padding-bottom: 40px;
        }

        /* Marquee header */
        #header {
            margin: 20px auto 10px;
            max-width: 420px;
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 18px 12px;
            border-radius: 14px;
            border: 4px solid gold;
            box-shadow: 0 0 25px gold;
            position: relative;
        }

        #header::before,
        #header::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid gold;
            background: radial-gradient(circle, #fff 10%, #ffd700 40%, #b8860b 70%);
            box-shadow: 0 0 12px gold;
        }

        #header::before { left: -30px; }
        #header::after { right: -30px; }

        /* ⭐ Cursive header font */
        #header h1 {
            margin: 0;
            font-family: "Great Vibes", cursive;
            font-size: 40px;
            letter-spacing: 1px;
            text-transform: none;
            text-shadow: 0 0 12px gold;
        }

        #header p {
            margin-top: 6px;
            font-size: 15px;
            color: #f5e1a0;
        }

        /* Spotlight */
        #spotlight {
            margin: 20px auto 0;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,200,0.45), transparent 70%);
            filter: blur(4px);
        }

        /* Photo frame */
        #photoFrame {
            margin: -230px auto 20px;
            width: 260px;
            padding: 10px;
            border: 4px solid gold;
            border-radius: 12px;
            box-shadow: 0 0 20px gold;
            background: #000;
            position: relative;
        }

        #samanthaPhoto {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        /* Upload box */
        #uploadBox {
            margin: 10px auto 0;
            max-width: 420px;
            padding: 18px;
            border: 4px solid gold;
            box-shadow: 0 0 20px gold;
            background: #111;
            border-radius: 12px;
        }

        p {
            font-size: 15px;
            color: #f5e1a0;
            margin: 8px 0;
        }

        .ticketButton {
            display: inline-block;
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            color: black;
            font-weight: bold;
            padding: 12px 18px;
            border-radius: 10px;
            border: 3px dashed black;
            margin-top: 12px;
            width: 90%;
            cursor: pointer;
            font-size: 15px;
            text-transform: uppercase;
            box-shadow: 0 0 12px gold;
        }

        .ticketButton input { display: none; }

        #status {
            margin-top: 16px;
            font-size: 15px;
            font-weight: bold;
            color: gold;
        }

        #footer {
            margin: 22px auto 0;
            max-width: 420px;
            background: linear-gradient(to bottom, #660000, #990000, #cc0000);
            padding: 14px;
            color: gold;
            font-size: 15px;
            border-radius: 12px;
            border-top: 4px solid gold;
            box-shadow: 0 -8px 20px gold;
        }
    </style>
</head>

<body>
    <div id="glitterOverlay"></div>

    <div id="curtainLeft"></div>
    <div id="curtainRight"></div>

    <div id="pageWrapper">
        <div id="content">

            <div id="header">
                <h1>Samantha's Sweet Sixteen</h1>
                <p>Red Carpet Photo Upload</p>
            </div>

            <div id="spotlight"></div>

            <div id="photoFrame">
                <img src="https://github.com/peterkottentailz-ctrl/Samantha-sweet-sixteen/raw/refs/heads/main/sams%20pic"
                     alt="Samantha" id="samanthaPhoto">
            </div>

            <div id="uploadBox">
                <p>Take a photo using your camera:</p>
                <label class="ticketButton">
                    Tap to Take Photo
                    <input type="file" id="cameraInput" accept="image/*" capture="environment">
                </label>

                <p style="margin-top:16px;">Or upload multiple photos from your gallery:</p>
                <label class="ticketButton">
                    Upload Gallery Photos
                    <input type="file" id="galleryInput" accept="image/*" multiple>
                </label>

                <div id="status"></div>
            </div>

            <div id="footer">
                Step into the spotlight and share your best Sweet Sixteen moments ✨
            </div>

        </div>
    </div>
