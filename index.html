<!DOCTYPE html>
<html>
<head>
<title>Samantha Raucho’s Sweet Sixteen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f7f0ff;
  padding: 20px;
}
h1 {
  color: #7a2cbf;
}
button {
  background: #7a2cbf;
  color: white;
  padding: 15px 25px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}
button:hover {
  background: #5e1f92;
}
#preview {
  margin-top: 20px;
  max-width: 90%;
}
</style>
</head>

<body>

<h1>Samantha Raucho’s Sweet Sixteen</h1>
<p>Take a photo and it will upload automatically!</p>

<input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none;">
<button onclick="document.getElementById('cameraInput').click();">Take Photo</button>

<img id="preview" />

<script>
document.getElementById('cameraInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Show preview
    const img = document.getElementById('preview');
    img.src = URL.createObjectURL(file);

    // Upload to Google Drive via your folder link
    const uploadUrl = "https://drive.google.com/drive/folders/1nRP71lmTxZrcirU9oQSS_6q_O7lcM7Ad?usp=sharing";

    alert("Your photo is being uploaded!");

    // Google Drive does not allow direct uploads via link,
    // so we redirect users to the upload page with the file selected.
    window.location.href = uploadUrl;
});
</script>

</body>
</html>
